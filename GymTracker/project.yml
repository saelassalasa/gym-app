name: GymTracker
options:
  bundleIdPrefix: com.brutalist
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: AD5DUJ7D8K

targets:
  GymTracker:
    type: application
    platform: iOS
    sources:
      - path: Models
      - path: Views
      - path: ViewModels
      - path: Services
      - path: Utilities
      - path: Assets.xcassets
      - path: GymTrackerApp.swift
      - path: Info.plist
        buildPhase: none
    settings:
      base:
        INFOPLIST_FILE: Info.plist
        GENERATE_INFOPLIST_FILE: NO
        PRODUCT_BUNDLE_IDENTIFIER: "saelassasolutions.GymTracker"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
